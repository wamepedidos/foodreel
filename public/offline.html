<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0B0B0C" />
    <title>FoodReel sin conexion</title>
    <script>
      (() => {
        const stored = localStorage.getItem('foodreel-theme-preference');
        const preference = stored === 'light' || stored === 'dark' || stored === 'system' ? stored : 'system';
        const systemTheme = window.matchMedia?.('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        const theme = preference === 'system' ? systemTheme : preference;
        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = theme;
        document.querySelector('meta[name="theme-color"]')?.setAttribute('content', theme === 'dark' ? '#0B0B0C' : '#F5F4F1');
      })();
    </script>
    <style>
      :root {
        --background: #0B0B0C;
        --surface: #202023;
        --text: #FFFFFF;
        --muted: #85858B;
        --border: rgba(255, 255, 255, 0.10);
        --primary: #FF6500;
      }

      :root[data-theme='light'] {
        --background: #F5F4F1;
        --surface: #FFFFFF;
        --text: #171719;
        --muted: #74747B;
        --border: rgba(20, 20, 24, 0.10);
        --primary: #F26100;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--background);
        color: var(--text);
        font-family: Inter, system-ui, sans-serif;
      }

      main {
        width: min(88vw, 420px);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 28px;
        background: var(--surface);
      }

      strong {
        color: var(--primary);
      }

      p {
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main>
      <strong>Sin conexion</strong>
      <h1>Algunas funciones no estan disponibles.</h1>
      <p>Vuelve a intentarlo cuando recuperes internet.</p>
    </main>
  </body>
</html>
